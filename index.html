<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage Background</title>
    <style>
        /* CSS Reset for a clean layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
            overflow-y: auto;
            font-family: Arial, sans-serif;
            background-color: #e0f7fa; 
            scroll-behavior: smooth;
        }

        /* --- FIRST BACKGROUND SECTION (Main Hand Area) --- */
        .first-section {
            background-image: url('Images/background-image.png');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            width: 100%;
            height: 100vh; 
            position: relative; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .hand-container-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80vh; 
        }

        /* --- SECOND BACKGROUND SECTION (Steps Tray Area) --- */
        .second-section {
            background-image: url('Images/1.png');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            width: 100%;
            height: 100vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* FINGER DROP TARGETS */
        .finger-drop-target {
            position: absolute;
            border: 3px dashed #00bcd4;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.45);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #006064;
            padding: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Finger Positions mappings */
        .finger-drop-target[data-slot="1"] { left: 25%; top: 50%; width: 13%; height: 20%; }
        .finger-drop-target[data-slot="2"] { left: 37%; top: 14%; width: 9%; height: 30%; }
        .finger-drop-target[data-slot="3"] { left: 45.5%; top: 4%; width: 9%; height: 35%; }
        .finger-drop-target[data-slot="4"] { left: 54%; top: 11%; width: 9%; height: 32%; }
        .finger-drop-target[data-slot="5"] { left: 63%; top: 20%; width: 8%; height: 27%; }

        /* --- OVERLAY FEEDBACK INDICATORS --- */
        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4.5rem; 
            font-weight: bold;
            z-index: 20;
            pointer-events: none; 
            opacity: 0;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        /* --- ANIMATIONS --- */
        @keyframes wavePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); border-color: #ff9800; background-color: rgba(255, 152, 0, 0.2); }
            100% { transform: scale(1); }
        }
        .animate-wave {
            animation: wavePulse 0.6s ease-in-out;
        }

        /* Correct Animation */
        @keyframes successPopLonger {
            0% { transform: scale(0); opacity: 0; }
            40% { transform: scale(1.4); opacity: 1; }
            60% { transform: scale(0.95); opacity: 1; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .correct .feedback-overlay {
            color: #2e7d32;
            animation: successPopLonger 1s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .correct {
            border: 5px solid #4caf50 !important;
            background-color: rgba(76, 175, 80, 0.25) !important;
            box-shadow: 0px 0px 25px rgba(76, 175, 80, 0.6);
            pointer-events: none; 
        }
        .correct .step-item {
            cursor: default !important;
            pointer-events: none; 
        }

        /* Incorrect Animation */
        @keyframes intenseErrorShake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-12px); }
            20%, 40%, 60%, 80% { transform: translateX(12px); }
        }
        @keyframes persistentFadeOut {
            0% { opacity: 1; transform: scale(1.4); }
            85% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; }
        }
        .incorrect {
            animation: intenseErrorShake 0.6s ease-in-out;
            border: 5px solid #d32f2f !important;
            background-color: rgba(244, 67, 54, 0.3) !important;
            box-shadow: 0px 0px 25px rgba(244, 67, 54, 0.6);
        }
        .incorrect .feedback-overlay {
            color: #d32f2f;
            animation: persistentFadeOut 1.5s forwards;
        }

        /* Green Textured Check Button */
        .check-btn {
            margin-bottom: 5vh;
            z-index: 5;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            box-shadow: 0px 8px 0px #1b5e20, 0px 15px 20px rgba(0, 0, 0, 0.3);
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .check-btn:hover {
            background: linear-gradient(135deg, #66bb6a 0%, #388e3c 100%);
            transform: translateY(-2px);
            box-shadow: 0px 10px 0px #1b5e20, 0px 18px 22px rgba(0, 0, 0, 0.35);
        }

        .check-btn:active {
            transform: translateY(6px);
            box-shadow: 0px 2px 0px #1b5e20, 0px 5px 10px rgba(0, 0, 0, 0.4);
        }

        /* Container that aligns all five steps side-by-side on page 2 */
        .steps-container {
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            width: 90%; 
            background-color: rgba(255, 255, 255, 0.85); 
            padding: 30px 20px;
            border-radius: 15px;
            min-height: 180px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
        }

        .step-item {
            width: 18%; 
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease, border 0.2s ease; 
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid transparent;
            border-radius: 10px;
        }

        .step-item.selected {
            border-color: #ff9800;
            transform: scale(1.05);
        }

        .step-item img {
            max-width: 100%; 
            height: auto;
            display: block;
        }

        .step-item:hover {
            transform: scale(1.1); 
            filter: drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.4)); 
        }

        .finger-drop-target .step-item {
            width: 95%;
            height: 95%;
        }

        .steps-container .step-item {
            width: 18%;
        }
    </style>
</head>
<body>

    <!-- FIRST BACKGROUND: Contains targets mapped out on the hand and the Check Button -->
    <div class="first-section" id="page-one">
        <div class="hand-container-area">
            <div class="finger-drop-target" data-slot="1"><span class="label-text">Unang Hakbang</span><div class="feedback-overlay"></div></div>
            <div class="finger-drop-target" data-slot="2"><span class="label-text">Pangalawang Hakbang</span><div class="feedback-overlay"></div></div>
            <div class="finger-drop-target" data-slot="3"><span class="label-text">Pangatlong Hakbang</span><div class="feedback-overlay"></div></div>
            <div class="finger-drop-target" data-slot="4"><span class="label-text">Pang Apat na Hakbang</span><div class="feedback-overlay"></div></div>
            <div class="finger-drop-target" data-slot="5"><span class="label-text">Pang Limang Hakbang</span><div class="feedback-overlay"></div></div>
        </div>
        
        <button class="check-btn" id="check-btn">Check</button>
    </div>

    <!-- SECOND BACKGROUND: Contains the steps tray system -->
    <div class="second-section">
        <div class="steps-container" id="original-tray">

            <div class="step-item" id="step4" data-step="4">
                <img src="Images/hakbang4.png" alt="Hakbang 4: Banlawan mabuti">
            </div>

            <div class="step-item" id="step5" data-step="5">
                <img src="Images/hakbang5.png" alt="Hakbang 5: Patuyuin ang kamay">
            </div>

            <div class="step-item" id="step1" data-step="1">
                <img src="Images/hakbang1.png" alt="Hakbang 1: Basain ang mga kamay">
            </div>

            <div class="step-item" id="step2" data-step="2">
                <img src="Images/hakbang2.png" alt="Hakbang 2: Maglagay ng sabon">
            </div>

            <div class="step-item" id="step3" data-step="3">
                <img src="Images/hakbang3.png" alt="Hakbang 3: Sabunin at kuskusin">
            </div>

        </div>
    </div>

    <script>
        const stepItems = document.querySelectorAll('.step-item');
        const dropTargets = document.querySelectorAll('.finger-drop-target');
        const originalTray = document.getElementById('original-tray');
        const checkBtn = document.getElementById('check-btn');
        let selectedStep = null;
        let waveInterval = null;

        // Initialize Web Audio API Audio Context safely
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        // Play Dynamic Sound Effects
        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'correct') {
                // Happy high chime
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // Note C5
                osc.frequency.setValueAtTime(659.25, now + 0.15); // Note E5
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'incorrect') {
                // Low buzzer buzz
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.setValueAtTime(100, now + 0.15);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }

        // Step Tapping Logic
        stepItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();

                if (item.parentElement.classList.contains('correct')) return;

                if (item.parentElement.classList.contains('finger-drop-target')) {
                    const parentTarget = item.parentElement;
                    originalTray.appendChild(item);
                    parentTarget.classList.remove('incorrect');
                    restoreLabel(parentTarget);
                    return;
                }

                stepItems.forEach(i => i.classList.remove('selected'));
                
                if (selectedStep === item) {
                    selectedStep = null; 
                    stopWaveAnimation(); 
                } else {
                    selectedStep = item;
                    item.classList.add('selected');
                    
                    document.getElementById('page-one').scrollIntoView({ behavior: 'smooth' });
                    startWaveAnimation();
                }
            });
        });

        // Finger Slot Tapping Logic
        dropTargets.forEach(target => {
            target.addEventListener('click', () => {
                if (target.classList.contains('correct') || target.classList.contains('incorrect')) return; 

                if (selectedStep && target.querySelectorAll('.step-item').length === 0) {
                    const label = target.querySelector('.label-text');
                    if (label) label.textContent = ""; 
                    target.appendChild(selectedStep);
                    selectedStep.classList.remove('selected');
                    selectedStep = null;
                    stopWaveAnimation();
                }
            });
        });

        // Dynamic "Check" Validation Logic
        checkBtn.addEventListener('click', () => {
            initAudio(); // Unlocks sound synthesis on user interaction tracking
            let correctCount = 0;
            let occupiedSlotsCount = 0;
            let hasIncorrectThisCheck = false;
            let hasCorrectThisCheck = false;

            dropTargets.forEach(target => {
                if (target.querySelector('.step-item') || target.classList.contains('correct')) {
                    occupiedSlotsCount++;
                }
            });

            if (occupiedSlotsCount === 0) return; 

            dropTargets.forEach(target => {
                if (target.classList.contains('correct')) {
                    correctCount++;
                    return; 
                }

                const slotIndex = target.dataset.slot;
                const childItem = target.querySelector('.step-item');
                const overlay = target.querySelector('.feedback-overlay');

                target.classList.remove('incorrect');
                overlay.textContent = "";

                if (childItem) {
                    const itemStepValue = childItem.dataset.step;

                    if (slotIndex === itemStepValue) {
                        target.classList.add('correct');
                        overlay.textContent = "✓";
                        correctCount++;
                        hasCorrectThisCheck = true;
                    } else {
                        target.classList.add('incorrect');
                        overlay.textContent = "✕";
                        hasIncorrectThisCheck = true;
                        
                        setTimeout(() => {
                            target.classList.remove('incorrect');
                            originalTray.appendChild(childItem);
                            restoreLabel(target);
                        }, 1500);
                    }
                }
            });

            // Handle validation sound alerts hierarchy
            if (hasIncorrectThisCheck) {
                playSound('incorrect');
            } else if (hasCorrectThisCheck) {
                playSound('correct');
            }
        });

        // Looping Wave Functions
        function startWaveAnimation() {
            stopWaveAnimation();
            runSingleWave();
            waveInterval = setInterval(runSingleWave, 1500);
        }

        function stopWaveAnimation() {
            if (waveInterval) {
                clearInterval(waveInterval);
                waveInterval = null;
            }
            dropTargets.forEach(target => target.classList.remove('animate-wave'));
        }

        function runSingleWave() {
            dropTargets.forEach(target => {
                const slotIndex = parseInt(target.dataset.slot);
                setTimeout(() => {
                    if (target.querySelectorAll('.step-item').length === 0 && !target.classList.contains('correct')) {
                        target.classList.add('animate-wave');
                        setTimeout(() => target.classList.remove('animate-wave'), 600);
                    }
                }, (slotIndex - 1) * 150); 
            });
        }

        function restoreLabel(target) {
            const label = target.querySelector('.label-text');
            const labels = {
                "1": "Unang Hakbang",
                "2": "Pangalawang Hakbang",
                "3": "Pangatlong Hakbang",
                "4": "Pang Apat na Hakbang",
                "5": "Pang Limang Hakbang"
            };
            if (label) label.textContent = labels[target.dataset.slot];
            const overlay = target.querySelector('.feedback-overlay');
            if (overlay) overlay.textContent = "";
        }
    </script>

</body>
</html>
